<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Cleaning Survey</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap for clean mobile layout -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <style>
    body { background: #f4f6f9; }
    .container { margin-top: 30px; }
    .card { border-radius: 10px; }
    .btn-primary { width: 100%; }
  </style>
</head>

<body>

<div class="container">
  <div class="card shadow p-4">
    <h3 class="text-center mb-4">Daily Cleaning Survey</h3>

    <form id="cleaningForm">

      <div class="form-group">
        <label>Room</label>
        <input type="text" class="form-control" id="room" placeholder="e.g. Room 12" required>
      </div>

      <div class="form-group">
        <label>Staff Name</label>
        <input type="text" class="form-control" id="staff" placeholder="Your name" required>
      </div>

      <div class="form-group">
        <label>Shift</label>
        <select class="form-control" id="shift" required>
          <option value="">Select shift</option>
          <option>Morning</option>
          <option>Evening</option>
          <option>Night</option>
        </select>
      </div>

      <hr>

      <h5>Cleaning Tasks</h5>

      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="floor_cleaned">
        <label class="form-check-label">Floor cleaned</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="trash_removed">
        <label class="form-check-label">Trash removed</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="surfaces_wiped">
        <label class="form-check-label">Surfaces wiped</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="equipment_sanitized">
        <label class="form-check-label">Equipment sanitized</label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="supplies_restocked">
        <label class="form-check-label">Supplies restocked</label>
      </div>

      <hr>

      <div class="form-group">
        <label>Notes (optional)</label>
        <textarea class="form-control" id="notes" rows="3"></textarea>
      </div>

      <button type="submit" class="btn btn-primary mt-3">Submit Survey</button>

      <p id="status" class="text-center mt-3"></p>

    </form>
  </div>
</div>

<script>
  const API_URL = "https://cleaning-survey-api.onrender.com/survey";

  document.getElementById("cleaningForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const payload = {
      room: document.getElementById("room").value,
      staff_name: document.getElementById("staff").value,
      shift: document.getElementById("shift").value,
      date: new Date().toISOString(),
      tasks_completed: {
        floor_cleaned: document.getElementById("floor_cleaned").checked,
        trash_removed: document.getElementById("trash_removed").checked,
        surfaces_wiped: document.getElementById("surfaces_wiped").checked,
        equipment_sanitized: document.getElementById("equipment_sanitized").checked,
        supplies_restocked: document.getElementById("supplies_restocked").checked
      },
      notes: document.getElementById("notes").value
    };

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        document.getElementById("status").innerHTML = "<span class='text-success'>Submitted successfully</span>";
        document.getElementById("cleaningForm").reset();
      } else {
        document.getElementById("status").innerHTML = "<span class='text-danger'>Submission failed</span>";
      }
    } catch (err) {
      document.getElementById("status").innerHTML = "<span class='text-danger'>Network error</span>";
    }
  });
</script>

</body>
</html>
