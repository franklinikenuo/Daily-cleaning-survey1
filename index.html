<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Cleaning Survey</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    .checkbox-group {
      margin-top: 10px;
    }
    .checkbox-group label {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      margin-top: 20px;
      font-size: 16px;
    }
    #success {
      margin-top: 15px;
      color: green;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Daily Cleaning Survey</h2>

    <form id="survey-form">

      <label>Room</label>
      <input type="text" id="room" placeholder="e.g. Room 12" required>

      <label>Staff Name</label>
      <input type="text" id="staff" placeholder="Your name" required>

      <label>Shift</label>
      <select id="shift" required>
        <option value="">Select shift</option>
        <option>Morning</option>
        <option>Evening</option>
        <option>Night</option>
      </select>

      <label>Cleaning Tasks</label>
      <div class="checkbox-group">
        <label><input type="checkbox" id="floor"> Floor cleaned</label>
        <label><input type="checkbox" id="trash"> Trash removed</label>
        <label><input type="checkbox" id="surfaces"> Surfaces wiped</label>
        <label><input type="checkbox" id="equipment"> Equipment sanitized</label>
        <label><input type="checkbox" id="supplies"> Supplies restocked</label>

        <!-- ⭐ NEW TASKS -->
        <label><input type="checkbox" id="sweep"> Sweep</label>
        <label><input type="checkbox" id="linen"> Linen Change</label>
        <label><input type="checkbox" id="vacuum"> Vacuum</label>
      </div>

      <label>Notes (optional)</label>
      <textarea id="notes" rows="3"></textarea>

      <button type="submit">Submit Survey</button>

      <div id="success"></div>

    </form>
  </div>

  <!-- Connects form to backend -->
  <script src="script.js"></script>

</body>
</html>
